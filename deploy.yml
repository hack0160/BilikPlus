# BilikGo — auto-deploy to InfinityFree via FTP on every push to main
name: Deploy to InfinityFree

on:
  push:
    branches: [ main ]
  workflow_dispatch:        # allows manual "Run workflow" button too

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Upload via FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          protocol: ftp
          server-dir: htdocs/          # change to htdocs/bilikgo/ if using a subfolder
          # never overwrite live user data on the server:
          exclude: |
            **/.git*
            **/.git*/**
            **/.github/**
            data/**
            uploads/**
            setup.php
